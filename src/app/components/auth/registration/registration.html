<div class="min-h-screen bg-gradient-to-br from-pink-100 via-white to-indigo-100 flex items-center justify-center px-4">

    <div
        class="w-full max-w-md bg-white/90 backdrop-blur-lg rounded-3xl shadow-2xl p-8 animate-fade-in">

        <!-- Logo -->
        <div class="flex justify-center">
            <div
                class="h-20 w-20 rounded-full bg-pink-600 flex items-center justify-center text-white text-3xl shadow-lg animate-bounce-slow">
                🚀
            </div>
        </div>

        <!-- Heading -->
        <div class="mt-6 text-center">
            <h2 class="text-4xl font-extrabold text-gray-800">
                Create Account
            </h2>

            <p class="mt-2 text-gray-500 text-sm">
                Register to start your journey
            </p>
        </div>

        <!-- Error -->
        <div *ngIf="error"
            class="mt-4 bg-red-100 border border-red-300 text-red-600 px-4 py-3 rounded-xl text-sm animate-pulse">
            {{ error }}
        </div>

        <!-- Form -->
        <form
            class="mt-8 space-y-5"
            [formGroup]="registerForm"
            (ngSubmit)="onSubmit()">

            <!-- Tenant -->
            <div>
                <label class="text-sm font-semibold text-gray-700">
                    Tenant ID
                </label>

                <input
                    type="text"
                    formControlName="tenantId"
                    placeholder="Enter Tenant ID"
                    class="mt-1 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-pink-500 focus:outline-none transition duration-300" />
            </div>

            <!-- Username -->
            <div>
                <label class="text-sm font-semibold text-gray-700">
                    Username
                </label>

                <input
                    type="text"
                    formControlName="username"
                    placeholder="Enter Username"
                    class="mt-1 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-pink-500 focus:outline-none transition duration-300" />
            </div>

            <!-- Email -->
            <div>
                <label class="text-sm font-semibold text-gray-700">
                    Email
                </label>

                <input
                    type="email"
                    formControlName="emailId"
                    placeholder="Enter Email"
                    class="mt-1 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-pink-500 focus:outline-none transition duration-300" />
            </div>

            <!-- Password -->
            <div>
                <label class="text-sm font-semibold text-gray-700">
                    Password
                </label>

                <input
                    type="password"
                    formControlName="password"
                    placeholder="Enter Password"
                    class="mt-1 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-pink-500 focus:outline-none transition duration-300" />
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="text-sm font-semibold text-gray-700">
                    Confirm Password
                </label>

                <input
                    type="password"
                    formControlName="confirmPassword"
                    placeholder="Confirm Password"
                    class="mt-1 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-pink-500 focus:outline-none transition duration-300" />
            </div>

            <!-- Password Error -->
            <div
                *ngIf="registerForm.errors?.['passwordMismatch']"
                class="text-red-500 text-sm">
                Passwords do not match
            </div>

            <!-- Button -->
            <button
                type="submit"
                [disabled]="loading"
                class="w-full bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-xl font-semibold shadow-lg transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-60">

                <svg
                    *ngIf="loading"
                    class="animate-spin h-5 w-5"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24">

                    <circle
                        class="opacity-25"
                        cx="12"
                        cy="12"
                        r="10"
                        stroke="currentColor"
                        stroke-width="4">
                    </circle>

                    <path
                        class="opacity-75"
                        fill="currentColor"
                        d="M4 12a8 8 0 018-8v8z">
                    </path>
                </svg>

                {{ loading ? 'Creating Account...' : 'Register' }}
            </button>

            <!-- Login -->
            <div class="text-center text-sm text-gray-600">
                Already have an account?

                <a
                    routerLink="/login"
                    class="text-pink-600 font-semibold hover:text-pink-800 ml-1">
                    Login
                </a>
            </div>

        </form>
    </div>
</div>
