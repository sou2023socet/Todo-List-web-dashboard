<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-100 via-white to-purple-100 px-4">
    <div
        class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-8 transform transition-all duration-500 hover:scale-[1.01]">

        <!-- Header -->
        <div class="text-center mb-8 animate-fade-in">
            <div
                class="mx-auto h-16 w-16 flex items-center justify-center rounded-full bg-indigo-100 text-indigo-600 shadow-md">
                🔐
            </div>

            <h2 class="mt-4 text-3xl font-extrabold text-gray-800">
                Forgot Password?
            </h2>

            <p class="mt-2 text-sm text-gray-500">
                Enter your registered email address and we’ll send you a password reset link.
            </p>
        </div>

        <!-- Form -->
        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Email Address
                </label>

                <input id="email" type="email" formControlName="email" placeholder="Enter your email"
                    class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all duration-300"
                    [ngClass]="{
                        'border-red-500': submitted && f['email'].errors,
                        'border-gray-300': !(submitted && f['email'].errors)
                    }" />

                <!-- Validation -->
                <div *ngIf="submitted && f['email'].errors" class="mt-2 text-sm text-red-500">
                    <div *ngIf="f['email'].errors['required']">
                        Email is required
                    </div>

                    <div *ngIf="f['email'].errors['email']">
                        Enter a valid email address
                    </div>
                </div>
            </div>

            <!-- Button -->
            <button type="submit" [disabled]="loading"
                class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold shadow-lg transition-all duration-300 disabled:opacity-60">

                <!-- Loader -->
                <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                        stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8v8H4z">
                    </path>
                </svg>

                <span>
                    {{ loading ? 'Sending Link...' : 'Send Reset Link' }}
                </span>
            </button>

            <!-- Success -->
            <div *ngIf="successMessage"
                class="bg-green-100 text-green-700 px-4 py-3 rounded-xl text-sm animate-pulse">
                {{ successMessage }}
            </div>

            <!-- Error -->
            <div *ngIf="errorMessage"
                class="bg-red-100 text-red-700 px-4 py-3 rounded-xl text-sm animate-pulse">
                {{ errorMessage }}
            </div>

            <!-- Back to Login -->
            <div class="text-center">
                <a routerLink="/login"
                    class="text-indigo-600 hover:text-indigo-800 font-medium transition-colors duration-300">
                    ← Back to Login
                </a>
            </div>
        </form>
    </div>
</div>
